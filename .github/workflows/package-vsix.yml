name: Package VSIX

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: code-ops-panel-vsix
          path: release-artifacts/*.vsix
